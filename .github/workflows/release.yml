name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          mkdir dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/dev_linux_amd64       ./cmd/dev/
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/dev_linux_arm64       ./cmd/dev/
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/dev_darwin_amd64      ./cmd/dev/
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/dev_darwin_arm64      ./cmd/dev/
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/dev_windows_amd64.exe ./cmd/dev/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
